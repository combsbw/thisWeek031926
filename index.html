<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#0d0f1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Scholar's Journal">
  <meta name="description" content="Weekly homeschool task tracker">
  <title>Scholar's Journal</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="icon" type="image/png" href="/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{overflow-x:hidden;-webkit-tap-highlight-color:transparent;}
    body{background:#0d0f1a;}
    @keyframes tw{from{opacity:0.05}to{opacity:0.35}}
    @keyframes fsu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes cb{0%{transform:scale(0);opacity:0}60%{transform:scale(1.3)}100%{transform:scale(1);opacity:1}}
    @keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
    @keyframes cel{0%{transform:scale(1)}35%{transform:scale(1.03)}65%{transform:scale(0.99)}100%{transform:scale(1)}}
    .scard{transition:border-color 0.3s,background 0.3s;animation:fsu 0.4s ease both;}
    .scard.cel-anim{animation:cel 0.5s ease!important;}
    .trow{display:flex;align-items:flex-start;gap:13px;padding:9px 0;cursor:pointer;-webkit-user-select:none;user-select:none;}
    .trow:hover .chk{filter:brightness(1.2);}
    .trow:active{opacity:0.85;}
    .pfill{height:100%;border-radius:99px;transition:width 0.5s cubic-bezier(0.34,1.56,0.64,1);}
    .dtab{cursor:pointer;padding:8px 16px;border-radius:4px 4px 0 0;border-bottom:none;font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;transition:all 0.25s;position:relative;white-space:nowrap;background:none;-webkit-user-select:none;user-select:none;}
    .tgl{cursor:pointer;border-radius:8px;padding:7px 10px;font-size:16px;line-height:1;transition:all 0.3s;border:none;}
    .tgl:hover{transform:scale(1.12);}
    @supports(padding-top:env(safe-area-inset-top)){
      body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);}
    }
  </style>
</head>
<body>
  <div id="root"></div>
